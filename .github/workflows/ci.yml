name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps for ta-lib
        run: sudo apt-get install -y build-essential

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-timeout pip-audit ruff mypy pyflakes

      - name: Compile sources
        run: python -m compileall -q src/

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type check (mypy)
        run: python -m mypy src/

      - name: Dead code (pyflakes)
        run: python -m pyflakes src/

      - name: Run tests with coverage
        run: pytest tests/ --timeout=30 --cov=src --cov-report=term-missing --cov-fail-under=50

      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt
